<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA - Virtual Friend</title>
    <link rel="stylesheet" href="/static/css/style.css?v=10">
    <!-- Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <!-- Face API -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <!-- MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>

<body>
    <div id="canvas-container"></div>

    <div id="ui-overlay">
        <!-- Hidden element — JS updates currentEmotion here without displaying it -->
        <span id="current-emotion" style="display:none;"></span>

        <div id="chat-container">
            <div id="chat-history">
                <!-- Messages will appear here -->
            </div>
        </div>

        <div id="controls">
            <button id="camera-btn" class="control-btn" title="Toggle Camera">
                📷
            </button>
            <div id="auto-correct-toggle" class="toggle-wrapper" title="Auto-Correction Toggle">
                <span class="toggle-icon">✏️</span>
                <label class="switch">
                    <input type="checkbox" id="auto-correct-cb" checked>
                    <span class="slider round"></span>
                </label>
            </div>
            <button id="new-chat-btn" class="control-btn" title="New Chat (Clear Memory)" style="background: rgba(255, 235, 59, 0.2); border-color: #fdd835;">
                ✨
            </button>


            <div class="input-wrapper">
                <button id="grammar-btn" class="inner-btn" title="Fix Grammar/Spelling">✨</button>
                <input type="text" id="text-input" placeholder="Type a message..." autocomplete="off">
                <button id="send-btn" class="control-btn">➤</button>
            </div>
            <div class="gesture-control-wrapper" style="position: relative;">
                <button id="gesture-btn" class="control-btn" title="Send Gesture">
                    👋
                </button>
                <div id="gesture-menu" class="hidden"
                    style="position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.84); border-radius: 12px; padding: 8px; display: flex; flex-direction: column; gap: 4px; width: 150px; z-index: 10001; max-height: 400px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                    <button class="gesture-option-btn" data-gesture="wave">👋 Wave</button>
                    <button class="gesture-option-btn" data-gesture="thumbs_up">👍 Thumbs Up</button>
                    <button class="gesture-option-btn" data-gesture="victory">✌️ Victory</button>
                    <button class="gesture-option-btn" data-gesture="clap">👏 Clap</button>
                    <button class="gesture-option-btn" data-gesture="dance">💃 Dance</button>
                    <button class="gesture-option-btn" data-gesture="hug">🫲 Hug</button>
                    <button class="gesture-option-btn" data-gesture="point">☝️ Point</button>
                    <button class="gesture-option-btn" data-gesture="horns">🤘 Horns</button>
                    <button class="gesture-option-btn" data-gesture="call_me">🤙 Call Me</button>
                    <button class="gesture-option-btn" data-gesture="thumbs_down">👎 Thumbs Down</button>
                    <button class="gesture-option-btn" data-gesture="ok">👌 OK</button>
                    <button class="gesture-option-btn" data-gesture="iloveyou">🤟 Love</button>
                    <button class="gesture-option-btn" data-gesture="vulcan">🖖 Vulcan</button>
                    <button class="gesture-option-btn" data-gesture="fist">✊ Fist</button>
                </div>
            </div>
            <button id="mic-btn" class="control-btn" title="Click to Talk">
                🎤
            </button>

            <div class="voice-control-wrapper" style="position: relative;">
                <button id="voice-btn" class="control-btn" title="Change Voice / Accent">
                    🗣️
                </button>
                <div id="voice-menu" class="hidden"
                    style="position: absolute; bottom: 110%; right: 0; background: rgba(0,0,0,0.84); border-radius: 12px; padding: 8px; display: flex; flex-direction: column; gap: 4px; width: 200px; z-index: 10001; max-height: 300px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                    <div style="color: rgba(255,255,255,0.5); font-size: 10px; padding: 5px 10px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 5px; text-align: center; font-weight: bold; letter-spacing: 1px;">SELECT VOICE ACCENT</div>
                    <button class="voice-option-btn" data-lang="en" data-tld="com">🇺🇸 United States (US)</button>
                    <button class="voice-option-btn" data-lang="en" data-tld="co.uk">🇬🇧 United Kingdom (UK)</button>
                    <button class="voice-option-btn" data-lang="en" data-tld="co.in">🇮🇳 India (IN)</button>
                    <button class="voice-option-btn" data-lang="en" data-tld="com.au">🇦🇺 Australia (AU)</button>
                    <button class="voice-option-btn" data-lang="en" data-tld="ca">🇨🇦 Canada (CA)</button>
                    <button class="voice-option-btn" data-lang="hi" data-tld="com">🇮🇳 Hindi (India)</button>
                    <button class="voice-option-btn" data-lang="fr" data-tld="com">🇫🇷 French (France)</button>
                    <button class="voice-option-btn" data-lang="es" data-tld="com">🇪🇸 Spanish (Spain)</button>
                </div>
            </div>

            <input type="file" id="resume-upload" accept="application/pdf" style="display: none;" />
        </div>

        <video id="user-camera" autoplay playsinline muted class="hidden"></video>

        <!-- Audio Player for Playback of Recorded Audio -->
        <div id="audio-playback-container"
            style="position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; display: none;">
            <p style="color: white; margin: 0 0 10px 0; text-align: center;">🎤 Your Recording:</p>
            <audio id="recorded-audio" controls style="width: 300px;"></audio>
        </div>
    </div>

    <script type="module" src="/static/js/main.js?v=43"></script>
</body>

</html>
