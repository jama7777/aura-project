<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Adaptive Ultramodern Realtime Assistant</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link rel="icon" href="favicon.ico">
    <style>
        /* Extra styles for the Voice Selector */
        #voice-dropdown {
            scrollbar-width: thin;
            scrollbar-color: rgba(108, 92, 231, 0.4) transparent;
        }
        .voice-item {
            padding: 10px 14px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 13px;
            color: #ccc;
            transition: 0.2s;
            border-left: 3px solid transparent;
        }
        .voice-item:hover {
            background: rgba(255,255,255,0.06);
            color: white;
        }
        .voice-item.active {
            background: rgba(108, 92, 231, 0.15);
            color: #a855f7;
            border-left-color: #a855f7;
            font-weight: 600;
        }
        .setup-group select {
            appearance: none;
            cursor: pointer;
        }
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #0a0a0f; color: white; font-family: 'Inter', sans-serif; overflow: hidden;">

    <!-- 3D AVATAR CANVAS -->
    <div id="canvas-container" style="position: fixed; inset: 0; z-index: 0;"></div>

    <!-- CAMERA PREVIEW (Picture-in-Picture) -->
    <div id="cam-preview-wrapper" style="
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 4000;
        display: none;
        flex-direction: column;
        align-items: flex-start;
        gap: 0;
        pointer-events: auto;
    ">
        <div style="position: relative; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.6);">
            <!-- Live border glow -->
            <div id="cam-glow-ring" style="
                position: absolute; inset: 0;
                border-radius: 16px;
                border: 2px solid rgba(0,255,136,0.7);
                box-shadow: 0 0 16px rgba(0,255,136,0.4), inset 0 0 16px rgba(0,255,136,0.05);
                z-index: 2;
                pointer-events: none;
                animation: camPulse 2s ease-in-out infinite;
            "></div>
            <!-- Video feed -->
            <video id="cam-preview-video" autoplay muted playsinline style="
                width: 200px;
                height: 150px;
                object-fit: cover;
                display: block;
                background: #000;
                transform: scaleX(-1);
            "></video>
            <!-- Overlay: LIVE badge + close btn -->
            <div style="
                position: absolute; top: 0; left: 0; right: 0;
                display: flex; align-items: center; justify-content: space-between;
                padding: 6px 8px; z-index: 3;
                background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);
            ">
                <div id="cam-live-badge" style="display: flex; align-items: center; gap: 5px; background: rgba(0,0,0,0.4); padding: 2px 8px; border-radius: 20px;">
                    <span style="width: 6px; height: 6px; background: #00ff88; border-radius: 50%; display: inline-block; animation: camPulse 1.5s ease-in-out infinite;"></span>
                    <span style="font-size: 10px; font-weight: 700; color: #00ff88; text-transform: uppercase; letter-spacing: 1px;">LIVE</span>
                </div>
                <button id="cam-close-btn" title="Hide Preview" style="
                    background: rgba(0,0,0,0.5); border: none; color: rgba(255,255,255,0.7);
                    font-size: 16px; width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
                    display: flex; align-items: center; justify-content: center; line-height: 1;
                ">×</button>
            </div>
            <!-- Bottom: emotion label -->
            <div style="
                position: absolute; bottom: 0; left: 0; right: 0;
                padding: 4px 8px; z-index: 3;
                background: linear-gradient(0deg, rgba(0,0,0,0.65) 0%, transparent 100%);
            ">
                <span id="cam-emotion-label" style="font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.8); text-transform: uppercase; letter-spacing: 1px;">Detecting...</span>
            </div>
        </div>
    </div>

    <style>
        @keyframes camPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>

    <!-- CHAT BOX — Pinned to TOP CENTER, outside all flex layouts -->
    <div id="chat-container">
        <div id="chat-history">
            <!-- Messages populate here -->
        </div>
    </div>

    <!-- MAIN UI LAYER -->
    <div id="ui-overlay" style="position: fixed; inset: 0; display: flex; flex-direction: column; pointer-events: none; padding: 20px; padding-bottom: 170px;">
        
        <!-- Global Voice Settings (Floating Top Right) -->
        <div style="position: absolute; top: 25px; right: 25px; display: flex; align-items: center; gap: 10px; z-index: 5000; pointer-events: auto;">
            <div style="position: relative;">
                <button id="voice-settings-btn" class="control-btn" title="Voice & Language" style="width: 44px; height: 44px; border-radius: 50%; font-size: 20px; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4); background: rgba(108, 92, 231, 0.15); border: 1px solid rgba(108, 92, 231, 0.3);">🌎</button>
                <div id="voice-dropdown" style="position: absolute; top: 55px; right: 0; background: rgba(15, 15, 25, 0.98); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 12px; display: none; flex-direction: column; gap: 6px; min-width: 190px; max-height: 300px; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.7); z-index: 5001;">
                    <!-- Voices populated by JS -->
                </div>
            </div>
        </div>
        
        <!-- Top Padding / Emotion Hidden Field -->
        <span id="current-emotion" style="display:none;"></span>

        <!-- TOP CONTROLS (moved from bottom) -->
        <div id="input-area" style="position: absolute; top: 20px; left: 50%; transform: translateX(-50%); pointer-events: auto; background: rgba(15, 15, 25, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; backdrop-filter: blur(30px); padding: 15px 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); max-width: 900px; width: calc(100% - 40px); z-index: 1000;">
            
            <!-- ROW 1: STATUS & TOGGLES -->
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05);">
                <div id="face-status" style="display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.3); padding: 4px 12px; border-radius: 20px; font-size: 11px;">
                    <span id="face-status-dot" style="width: 7px; height: 7px; background: #888; border-radius: 50%;"></span>
                    <span style="color: #aaa; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Camera Off</span>
                </div>

                <div style="display: flex; align-items: center; gap: 20px;">
                    <!-- Speed Control -->
                    <div id="tts-speed-wrapper" style="display: flex; gap: 8px; align-items: center;">
                        <span style="color: white; font-size: 11px; opacity: 0.6;">Speed:</span>
                        <input type="range" id="tts-speed" min="0.5" max="2.0" step="0.1" value="1.0" 
                            style="width: 70px; height: 3px; border-radius: 5px; background: rgba(255,255,255,0.2); outline: none; cursor: pointer; appearance: none; -webkit-appearance: none;">
                        <span id="speed-value" style="color: #00ff88; font-size: 11px; min-width: 25px; font-weight: 700;">1.0x</span>
                    </div>

                    <!-- Interview Toggle -->
                    <label class="mode-toggle" style="display: flex; align-items: center; gap: 8px; cursor: pointer; pointer-events: auto;">
                        <input type="checkbox" id="mode-cb" style="display: none;">
                        <span id="mode-icon" style="font-size: 16px;">🏠</span>
                        <span id="mode-text" style="color: white; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Home Mode</span>
                    </label>
                </div>
            </div>

            <!-- ROW 2: INPUT & MAIN BUTTONS -->
            <div style="display: flex; align-items: center; gap: 12px;">
                <button id="camera-btn" class="control-btn" title="Toggle Camera">📷</button>
                <button id="new-chat-btn" class="control-btn" title="New Chat" style="background: rgba(255, 235, 59, 0.1); border-color: rgba(255,235,59,0.3);">✨</button>
                
                <div style="flex: 1; display: flex; align-items: center; background: rgba(255,255,255,0.05); border-radius: 18px; padding: 4px 6px; border: 1px solid rgba(255,255,255,0.1);">
                    <input type="text" id="text-input" placeholder="Message AURA..." style="flex: 1; background: transparent; border: none; color: white; padding: 10px 15px; font-size: 15px; outline: none;" autocomplete="off">
                    <button id="send-btn" style="background: linear-gradient(135deg, #6c5ce7, #a855f7); color: white; border: none; width: 36px; height: 36px; border-radius: 12px; cursor: pointer; font-weight: bold;">➤</button>
                </div>

                <button id="mic-btn" class="control-btn" title="Voice Input">🎤</button>
                <button id="code-toggle-btn" class="control-btn" title="Code IDE" style="background: rgba(108, 92, 231, 0.15); border-color: rgba(108, 92, 231, 0.4);">💻</button>
            </div>
        </div>
    </div>

    <!-- INTERVIEW DASHBOARD OVERLAY -->
    <div id="interview-overlay" style="position: fixed; inset: 0; background: rgba(10, 10, 20, 0.95); backdrop-filter: blur(40px); z-index: 20000; display: none; flex-direction: column; align-items: center; justify-content: center; overflow-y: auto; padding: 40px 20px; opacity: 0; transition: opacity 0.4s ease;">
        <div style="max-width: 900px; width: 100%; border-radius: 40px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); padding: 50px; box-shadow: 0 50px 100px rgba(0,0,0,0.5); text-align: center;">
            <h1 style="color: white; font-size: 38px; margin-bottom: 10px; font-weight: 800; letter-spacing: -1px;">Technical Mock Setup</h1>
            <p style="color: #888; margin-bottom: 50px; font-size: 16px;">Pick a target company and domain to start your session.</p>

            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 40px;">
                <div class="setup-group" style="text-align: left;">
                    <label style="color: #6c5ce7; font-size: 11px; font-weight: 700; text-transform: uppercase;">Company Selection</label>
                    <select id="setup-company" style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; color: white; outline: none; margin-top: 8px;">
                        <option value="Google">Google</option>
                        <option value="Microsoft">Microsoft</option>
                        <option value="Amazon">Amazon</option>
                        <option value="NVIDIA">NVIDIA</option>
                        <option value="Meta">Meta</option>
                        <option value="Tesla">Tesla</option>
                        <option value="Apple">Apple</option>
                        <option value="Netflix">Netflix</option>
                        <option value="SpaceX">SpaceX</option>
                        <option value="Anthropic">Anthropic</option>
                        <option value="OpenAI">OpenAI</option>
                    </select>
                </div>
                <div class="setup-group" style="text-align: left;">
                    <label style="color: #6c5ce7; font-size: 11px; font-weight: 700; text-transform: uppercase;">Target Role</label>
                    <select id="setup-domain" style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; color: white; outline: none; margin-top: 8px;">
                        <option value="Software Engineer">Software Engineer</option>
                        <option value="AI Engineer">AI Engineer</option>
                        <option value="ML Engineer">ML Engineer</option>
                        <option value="Backend Developer">Backend Developer</option>
                        <option value="Frontend Engineer">Frontend Engineer</option>
                        <option value="Cyber Security">Cyber Security</option>
                        <option value="DevOps Engineer">DevOps Engineer</option>
                        <option value="Data Engineer">Data Engineer</option>
                        <option value="Cloud Architect">Cloud Architect</option>
                        <option value="Product Manager">Product Manager</option>
                    </select>
                </div>
                <div class="setup-group" style="text-align: left;">
                    <label style="color: #6c5ce7; font-size: 11px; font-weight: 700; text-transform: uppercase;">Difficulty Level</label>
                    <select id="setup-level" style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; color: white; outline: none; margin-top: 8px;">
                        <option value="junior">Junior (Entry Level)</option>
                        <option value="mid" selected>Mid (SDE-II)</option>
                        <option value="senior">Senior (Staff/Lead)</option>
                    </select>
                </div>
                <div class="setup-group" style="text-align: left;">
                    <label style="color: #6c5ce7; font-size: 11px; font-weight: 700; text-transform: uppercase;">AURA's Voice & Accent</label>
                    <select id="setup-voice" style="width: 100%; background: rgba(108, 92, 231, 0.1); border: 1px solid rgba(108, 92, 231, 0.3); border-radius: 12px; padding: 12px; color: white; outline: none; margin-top: 8px;">
                        <option value="en-com">American English (Default)</option>
                        <option value="en-co.uk">British English</option>
                        <option value="en-com.au">Australian English</option>
                        <option value="en-co.in">Indian English</option>
                        <option value="en-ie">Irish English</option>
                        <option value="en-za">South African</option>
                    </select>
                </div>
            </div>

            <div style="display: flex; gap: 20px; justify-content: center;">
                <button id="cancel-interview-btn" style="background: rgba(255,255,255,0.05); color: #888; border: 1px solid rgba(255,255,255,0.1); padding: 15px 35px; border-radius: 20px; font-weight: 600; cursor: pointer; transition: 0.2s;">Go Back</button>
                <button id="launch-interview-btn" style="background: linear-gradient(135deg, #6c5ce7, #a855f7); color: white; border: none; padding: 15px 55px; border-radius: 20px; font-weight: 700; font-size: 18px; cursor: pointer; box-shadow: 0 10px 30px rgba(108,92,231,0.4); transition: 0.2s;">Start Now 🚀</button>
            </div>
            
            <div style="margin-top: 30px; padding: 20px; background: rgba(0, 150, 136, 0.05); border-radius: 20px; border: 1px dashed rgba(0, 150, 136, 0.2);">
                <p style="color: #009688; font-size: 13px;">Optional: <button id="upload-resume-dash-btn" style="background:none; border:none; color:white; text-decoration:underline; cursor:pointer; font-weight:700;">Upload Resume</button> for tailored questions.</p>
                <input type="file" id="resume-upload" accept="application/pdf" style="display: none;" />
            </div>
        </div>
    </div>

    <!-- CODE EDITOR OVERLAY -->
    <div id="code-overlay" style="position: fixed; inset: 0; background: rgba(5,5,15,0.97); z-index: 10000; display: none; flex-direction: column; padding: 0;">
        <!-- Code Editor Topbar -->
        <div id="code-topbar" style="display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: rgba(108,92,231,0.12); border-bottom: 1px solid rgba(255,255,255,0.07); flex-shrink: 0;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <span style="font-size: 18px;">💻</span>
                <span style="color: white; font-weight: 700; font-size: 14px;">Code Workspace</span>
                <select id="editor-lang" style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: white; padding: 4px 10px; font-size: 12px; outline: none; cursor: pointer;">
                    <option value="python">Python</option>
                    <option value="javascript">JavaScript</option>
                    <option value="cpp">C++</option>
                    <option value="java">Java</option>
                    <option value="typescript">TypeScript</option>
                    <option value="go">Go</option>
                    <option value="rust">Rust</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="run-code-btn" style="background: linear-gradient(135deg, #00b894, #00cec9); color: white; border: none; padding: 6px 18px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 13px;">▶ Run</button>
                <button id="send-code-btn" style="background: linear-gradient(135deg, #6c5ce7, #a855f7); color: white; border: none; padding: 6px 18px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 13px;">↑ Send to AURA</button>
                <button id="close-code-btn" style="background: rgba(255,100,100,0.15); border: 1px solid rgba(255,100,100,0.3); color: #ff6b6b; width: 34px; height: 34px; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold;">×</button>
            </div>
        </div>
        <!-- Monaco Editor Container -->
        <div id="editor-container" style="flex: 1; width: 100%;"></div>
        <!-- Output Panel -->
        <div id="code-output" style="height: 140px; background: rgba(0,0,0,0.6); border-top: 1px solid rgba(255,255,255,0.07); padding: 12px 20px; font-family: monospace; font-size: 13px; color: #00ff88; overflow-y: auto; flex-shrink: 0;">
            <span style="color: #666;">// Output will appear here after running code</span>
        </div>
    </div>

    <!-- HIDDEN WEBCAM: Must be 320x240 — face-api.js needs real frame data, not a 1px video -->
    <video id="webcam-video" autoplay muted playsinline width="320" height="240"
           style="position:fixed; top:-9999px; left:-9999px; width:320px; height:240px; opacity:0; pointer-events:none;"></video>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/fflate@0.7.4/umd/index.js"></script>
    <!-- Monaco Editor (Code IDE) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script src="static/js/avatar.js?v=6.0"></script>
    <script src="static/js/face_emotion.js?v=6.0"></script>
    <script src="static/js/face_detector.js?v=6.0"></script>
    <script src="static/js/main.js?v=6.0"></script>
</body>
</html>
